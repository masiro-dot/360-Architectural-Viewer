<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>masiro | 360° Panorama Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent: #c9a96e;
            --text: #ffffff;
            --panel-bg: rgba(0, 0, 0, 0.7);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        header {
            position: absolute; top: 0; width: 100%; padding: 20px 30px;
            display: flex; align-items: baseline; gap: 12px; z-index: 100; pointer-events: none;
        }
        /* ロゴを masiro に変更 */
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 26px; letter-spacing: 0.1em; text-transform: lowercase; }
        .logo span { color: var(--accent); font-style: italic; margin-left: 4px; font-size: 20px; }

        #viewer-container { width: 100%; height: 100vh; cursor: grab; }

        #ui-panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--panel-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); padding: 8px 24px;
            display: flex; align-items: center; gap: 20px; border-radius: 50px; z-index: 100;
        }
        .file-info { font-size: 10px; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; }
        .btn-group { display: flex; gap: 15px; }
        button {
            background: transparent; border: none; color: var(--text); font-size: 10px;
            letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; padding: 5px 0;
        }
        button.active { color: var(--accent); border-bottom: 1px solid var(--accent); }

        #drop-zone {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.9); z-index: 50; transition: 0.6s ease;
        }
        #drop-zone.hidden { opacity: 0; pointer-events: none; }
        .drop-text { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-style: italic; color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="logo">masiro<span>360°</span></div>
</header>

<div id="viewer-container">
    <div id="drop-zone"><div class="drop-text">Open Your Perspective</div></div>
</div>

<div id="ui-panel">
    <div class="file-info" id="file-name">Waiting for Image...</div>
    <div class="btn-group">
        <button id="rotate-btn" class="active">Rotate</button>
        <button id="upload-btn">Import</button>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none;">
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, sphere;
let lon = 0, lat = 0, phi = 0, theta = 0;
let isUserInteracting = false;
let autoRotate = true;

init();
animate();

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1100);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    
    // 【明るさ設定】補正を一切通さず、テクスチャのピクセルをそのまま出力
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.NoToneMapping; 
    
    document.getElementById('viewer-container').appendChild(renderer.domElement);

    const geometry = new THREE.SphereGeometry(500, 60, 40);
    geometry.scale(-1, 1, 1);
    
    // 画像そのものの色味を100%出すため、光の影響を受けない素材を使用
    const material = new THREE.MeshBasicMaterial({ color: 0x000000 });
    sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);

    setupInteractions();
    setupFileUpload();
}

function loadTexture(file) {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        new THREE.TextureLoader().load(e.target.result, (texture) => {
            texture.colorSpace = THREE.SRGBColorSpace;
            sphere.material.map = texture;
            sphere.material.color.set(0xffffff); // 発光を最大に
            sphere.material.needsUpdate = true;
            document.getElementById('drop-zone').classList.add('hidden');
            document.getElementById('file-name').textContent = file.name;
        });
    };
    reader.readAsDataURL(file);
}

function setupInteractions() {
    const container = document.getElementById('viewer-container');
    container.addEventListener('pointerdown', (e) => {
        isUserInteracting = true;
        const startX = e.clientX, startY = e.clientY;
        const startLon = lon, startLat = lat;
        const onPointerMove = (ev) => {
            lon = (startX - ev.clientX) * 0.15 + startLon;
            lat = (ev.clientY - startY) * 0.15 + startLat;
        };
        const onPointerUp = () => {
            isUserInteracting = false;
            document.removeEventListener('pointermove', onPointerMove);
            document.removeEventListener('pointerup', onPointerUp);
        };
        document.addEventListener('pointermove', onPointerMove);
        document.addEventListener('pointerup', onPointerUp);
    });
    container.addEventListener('wheel', (e) => {
        camera.fov = Math.min(85, Math.max(20, camera.fov + e.deltaY * 0.05));
        camera.updateProjectionMatrix();
    });
}

function setupFileUpload() {
    const input = document.getElementById('file-input');
    document.getElementById('upload-btn').onclick = () => input.click();
    input.onchange = (e) => loadTexture(e.target.files[0]);
    window.ondragover = (e) => e.preventDefault();
    window.ondrop = (e) => { e.preventDefault(); loadTexture(e.dataTransfer.files[0]); };
}

document.getElementById('rotate-btn').onclick = function() {
    autoRotate = !autoRotate;
    this.classList.toggle('active');
};

function animate() {
    requestAnimationFrame(animate);
    if (autoRotate && !isUserInteracting) lon += 0.08;
    lat = Math.max(-85, Math.min(85, lat));
    phi = THREE.MathUtils.degToRad(90 - lat);
    theta = THREE.MathUtils.degToRad(lon);
    camera.lookAt(500 * Math.sin(phi) * Math.cos(theta), 500 * Math.cos(phi), 500 * Math.sin(phi) * Math.sin(theta));
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
