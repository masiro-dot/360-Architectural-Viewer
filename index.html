<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>masiro | 360° Studio Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent: #c9a96e;
            --text: #ffffff;
            --panel-bg: rgba(10, 10, 10, 0.85);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        /* UI全体のフェード管理 */
        .ui-element { transition: opacity 0.4s ease, visibility 0.4s ease; opacity: 1; visibility: visible; }
        .ui-hidden .ui-element { opacity: 0; visibility: hidden; pointer-events: none; }

        header {
            position: absolute; top: 0; width: 100%; padding: 20px 30px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100; pointer-events: none;
        }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 26px; letter-spacing: 0.1em; pointer-events: auto; }
        .logo span { color: var(--accent); font-style: italic; margin-left: 4px; font-size: 20px; }

        #viewer-container { width: 100%; height: 100vh; cursor: grab; background: #000; }

        #side-list {
            position: absolute; left: 20px; top: 80px; width: 220px; max-height: 60vh;
            background: var(--panel-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 4px;
            overflow-y: auto; z-index: 110; display: none;
        }
        #side-list.active { display: block; }
        .list-item { font-size: 11px; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.6; }
        .list-item:hover, .list-item.active { opacity: 1; color: var(--accent); background: rgba(255,255,255,0.05); }

        #ui-panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); padding: 10px 25px;
            display: flex; align-items: center; gap: 15px; border-radius: 50px; z-index: 120;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: fit-content; max-width: 95vw;
        }
        .btn-group { display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; }
        button {
            background: transparent; border: none; color: var(--text); font-size: 10px;
            letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: 0.2s;
            padding: 5px 4px; white-space: nowrap;
        }
        button:hover { color: var(--accent); }
        button.active { color: var(--accent); font-weight: bold; border-bottom: 1px solid var(--accent); }
        
        #drop-zone { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 200; pointer-events: none; }
        #drop-zone.hidden { opacity: 0; visibility: hidden; }
        
        /* ヘルプメッセージ */
        #hint { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--accent); opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>

<header class="ui-element">
    <div class="logo">masiro<span>360°</span></div>
</header>

<div id="side-list" class="ui-element">
    <div id="image-items"></div>
</div>

<div id="viewer-container">
    <div id="drop-zone"><div style="font-family: 'Cormorant Garamond', serif; font-size: 28px; color: var(--accent);">Open Your Vision</div></div>
</div>

<div id="hint" class="ui-element">Tap background to toggle UI</div>

<div id="ui-panel" class="ui-element">
    <div class="btn-group">
        <button id="upload-btn">Import</button>
        <button id="rotate-btn" class="active">Auto</button>
        <button id="gyro-btn">Gyro</button>
        <button id="shot-btn">Snapshot</button>
        <button id="rec-btn">Record</button>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple style="display:none;">
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, sphere;
let lon = 0, lat = 0, phi = 0, theta = 0;
let isUserInteracting = false, autoRotate = true, useGyro = false;
let mediaRecorder, recordedChunks = [];

// ジャイロ用
let deviceAlpha = 0, deviceBeta = 0, deviceGamma = 0;

init();
animate();

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1100);

    renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.NoToneMapping;
    
    document.getElementById('viewer-container').appendChild(renderer.domElement);

    const geometry = new THREE.SphereGeometry(500, 60, 40);
    geometry.scale(-1, 1, 1);
    sphere = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ color: 0x000000 }));
    scene.add(sphere);

    setupInteractions();
    setupFeatures();
}

function setupInteractions() {
    const container = document.getElementById('viewer-container');
    
    // UIのトグル機能
    container.addEventListener('click', (e) => {
        if (!isUserInteracting) {
            document.body.classList.toggle('ui-hidden');
        }
    });

    container.addEventListener('pointerdown', (e) => {
        isUserInteracting = true;
        const startX = e.clientX, startY = e.clientY, startLon = lon, startLat = lat;
        const move = (ev) => {
            lon = (startX - ev.clientX) * 0.15 + startLon;
            lat = (ev.clientY - startY) * 0.15 + startLat;
        };
        const up = () => { isUserInteracting = false; document.removeEventListener('pointermove', move); };
        document.addEventListener('pointermove', move);
        document.addEventListener('pointerup', up);
    });

    container.addEventListener('wheel', (e) => {
        camera.fov = Math.min(95, Math.max(25, camera.fov + e.deltaY * 0.05));
        camera.updateProjectionMatrix();
    });
}

function setupFeatures() {
    const input = document.getElementById('file-input');
    document.getElementById('upload-btn').onclick = () => input.click();
    input.onchange = (e) => handleFiles(e.target.files);

    document.getElementById('rotate-btn').onclick = function() {
        autoRotate = !autoRotate;
        this.classList.toggle('active');
    };

    document.getElementById('shot-btn').onclick = () => {
        const link = document.createElement('a');
        link.download = `masiro_shot_${Date.now()}.png`;
        link.href = renderer.domElement.toDataURL('image/png');
        link.click();
    };

    // ジャイロ有効化
    document.getElementById('gyro-btn').onclick = function() {
        if (!useGyro) {
            requestGyroPermission(this);
        } else {
            useGyro = false;
            this.classList.remove('active');
        }
    };
}

async function requestGyroPermission(btn) {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
            const permission = await DeviceOrientationEvent.requestPermission();
            if (permission === 'granted') {
                enableGyro(btn);
            }
        } catch (e) { alert("Gyro error: " + e); }
    } else {
        enableGyro(btn);
    }
}

function enableGyro(btn) {
    useGyro = true;
    btn.classList.add('active');
    window.addEventListener('deviceorientation', (e) => {
        if (!useGyro) return;
        // 初回の基準値を設定
        if (deviceAlpha === 0) deviceAlpha = e.alpha;
        lon = (e.alpha - deviceAlpha) + (e.gamma * 0.5); // 簡易的な補正
        lat = e.beta - 90;
    }, true);
}

function handleFiles(files) {
    const listContainer = document.getElementById('image-items');
    const sideList = document.getElementById('side-list');
    sideList.classList.add('active');
    
    Array.from(files).forEach((file, index) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const item = document.createElement('div');
            item.className = 'list-item';
            item.textContent = file.name;
            item.onclick = (event) => { event.stopPropagation(); loadToViewer(e.target.result, item); };
            listContainer.appendChild(item);
            if (index === 0 && document.querySelectorAll('.list-item').length === 1) loadToViewer(e.target.result, item);
        };
        reader.readAsDataURL(file);
    });
}

function loadToViewer(src, element) {
    new THREE.TextureLoader().load(src, (texture) => {
        texture.colorSpace = THREE.SRGBColorSpace;
        sphere.material.map = texture;
        sphere.material.needsUpdate = true;
        document.getElementById('drop-zone').classList.add('hidden');
        document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
    });
}

function animate() {
    requestAnimationFrame(animate);
    if (autoRotate && !isUserInteracting && !useGyro) lon += 0.08;
    lat = Math.max(-85, Math.min(85, lat));
    phi = THREE.MathUtils.degToRad(90 - lat);
    theta = THREE.MathUtils.degToRad(lon);
    camera.lookAt(500 * Math.sin(phi) * Math.cos(theta), 500 * Math.cos(phi), 500 * Math.sin(phi) * Math.sin(theta));
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
