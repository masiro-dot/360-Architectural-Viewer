<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Design Mashiro | 360° Viewer Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --ui-bg: rgba(15, 15, 15, 0.85);
            --accent: #c9a96e;
            --text: #e8e6e1;
            --line: rgba(201, 169, 110, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-deep); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* 建築デザインらしいヘッダー追加 */
        header {
            position: absolute;
            top: 0; width: 100%;
            padding: 20px 30px;
            display: flex;
            align-items: baseline;
            gap: 15px;
            z-index: 100;
            pointer-events: none;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            letter-spacing: 0.1em;
            color: var(--text);
        }

        .logo span { color: var(--accent); }

        #viewer-container { width: 100%; height: 100vh; cursor: grab; }

        /* UIパネルの洗練 */
        #ui-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--ui-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--line);
            padding: 10px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-radius: 2px;
            z-index: 100;
        }

        .file-info { font-size: 11px; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; }

        .btn-group { display: flex; gap: 10px; }
        button {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            padding: 8px 12px;
            transition: 0.3s;
        }
        button:hover { color: var(--accent); }
        button.active { border-bottom: 1px solid var(--accent); }

        /* 初期案内 */
        #drop-zone {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.8);
            z-index: 50;
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-style: italic;
            letter-spacing: 0.1em;
            transition: 0.5s;
        }
        #drop-zone.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">DESIGN MASHIRO <span>360°</span></div>
</header>

<div id="viewer-container">
    <div id="drop-zone" id="drop-zone">
        Drop your panorama here
    </div>
</div>

<div id="ui-panel">
    <div class="file-info" id="file-name">Waiting for Image...</div>
    <div class="btn-group">
        <button id="rotate-btn" class="active">Rotation</button>
        <button id="upload-btn">Upload</button>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none;">
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, sphere;
let lon = 0, lat = 0, phi = 0, theta = 0;
let isUserInteracting = false;
let autoRotate = true;

init();
animate();

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1100);

    renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    
    // 【重要】明るさを正しく表現するための設定
    renderer.outputColorSpace = THREE.SRGBColorSpace; 
    renderer.toneMapping = THREE.ACESFilmicToneMapping; // 映画のような階調表現
    renderer.toneMappingExposure = 1.2; // 明るさの露出調整（ここを上げると明るくなります）

    document.getElementById('viewer-container').appendChild(renderer.domElement);

    const geometry = new THREE.SphereGeometry(500, 60, 40);
    geometry.scale(-1, 1, 1);
    const material = new THREE.MeshBasicMaterial({ color: 0x222222 });
    sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);

    // イベント設定
    const container = document.getElementById('viewer-container');
    container.addEventListener('pointerdown', (e) => {
        isUserInteracting = true;
        const onPointerMove = (ev) => {
            lon = (e.clientX - ev.clientX) * 0.1 + lon;
            lat = (ev.clientY - e.clientY) * 0.1 + lat;
        };
        const onPointerUp = () => {
            isUserInteracting = false;
            document.removeEventListener('pointermove', onPointerMove);
            document.removeEventListener('pointerup', onPointerUp);
        };
        document.addEventListener('pointermove', onPointerMove);
        document.addEventListener('pointerup', onPointerUp);
    });

    container.addEventListener('wheel', (e) => {
        camera.fov = Math.min(80, Math.max(30, camera.fov + e.deltaY * 0.05));
        camera.updateProjectionMatrix();
    });

    setupFileUpload();
}

function setupFileUpload() {
    const input = document.getElementById('file-input');
    const uploadBtn = document.getElementById('upload-btn');
    const dropZone = document.getElementById('drop-zone');

    uploadBtn.onclick = () => input.click();
    input.onchange = (e) => loadTexture(e.target.files[0]);
    
    window.ondragover = (e) => { e.preventDefault(); };
    window.ondrop = (e) => {
        e.preventDefault();
        loadTexture(e.dataTransfer.files[0]);
    };
}

function loadTexture(file) {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        new THREE.TextureLoader().load(e.target.result, (texture) => {
            texture.colorSpace = THREE.SRGBColorSpace; // テクスチャの色空間を正しく設定
            sphere.material.map = texture;
            sphere.material.needsUpdate = true;
            document.getElementById('drop-zone').classList.add('hidden');
            document.getElementById('file-name').textContent = file.name;
        });
    };
    reader.readAsDataURL(file);
}

document.getElementById('rotate-btn').onclick = function() {
    autoRotate = !autoRotate;
    this.classList.toggle('active');
};

function animate() {
    requestAnimationFrame(animate);
    if (autoRotate && !isUserInteracting) lon += 0.1;
    lat = Math.max(-85, Math.min(85, lat));
    phi = THREE.MathUtils.degToRad(90 - lat);
    theta = THREE.MathUtils.degToRad(lon);
    camera.lookAt(500 * Math.sin(phi) * Math.cos(theta), 500 * Math.cos(phi), 500 * Math.sin(phi) * Math.sin(theta));
    renderer.render(scene, camera);
}
</script>
</body>
</html>
