<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>masiro | 360° Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent: #c9a96e;
            --text: #ffffff;
            --panel-bg: rgba(20, 20, 20, 0.98); /* 視認性を極限まで高めるためほぼ不透明に */
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        /* UIの初期表示を確実に「見える」状態にする */
        .ui-element { opacity: 1 !important; visibility: visible !important; transition: opacity 0.3s ease; z-index: 1000; }
        .ui-hidden .ui-element { opacity: 0 !important; visibility: hidden !important; pointer-events: none; }

        header {
            position: absolute; top: 0; width: 100%; padding: 25px 30px;
            display: flex; justify-content: space-between; align-items: center; pointer-events: none;
        }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 26px; letter-spacing: 0.1em; pointer-events: auto; }
        .logo span { color: var(--accent); font-style: italic; margin-left: 4px; font-size: 20px; }

        #viewer-container { width: 100%; height: 100vh; cursor: grab; background: #000; }

        #side-list {
            position: absolute; left: 20px; top: 85px; width: 240px; max-height: 50vh;
            background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.2); 
            padding: 15px; border-radius: 8px; overflow-y: auto; display: none;
        }
        #side-list.active { display: block; }
        .list-item { font-size: 11px; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .list-item:hover, .list-item.active { color: var(--accent); background: rgba(201, 169, 110, 0.15); }

        #ui-panel {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--panel-bg); border: 2px solid var(--accent); /* 枠線をつけて存在を強調 */
            padding: 15px 30px; border-radius: 60px; display: flex; align-items: center; gap: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }
        .btn-group { display: flex; gap: 15px; }
        button {
            background: transparent; border: none; color: #ffffff; font-size: 12px; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; padding: 10px 5px;
        }
        button.active { color: var(--accent); text-decoration: underline; }
        
        #drop-zone { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 2000; pointer-events: none; }
        #drop-zone.hidden { opacity: 0; visibility: hidden; }
        #hint { position: absolute; bottom: 115px; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--accent); pointer-events: none; }
    </style>
</head>
<body>

<header class="ui-element">
    <div class="logo">masiro<span>360°</span></div>
</header>

<div id="side-list" class="ui-element">
    <div id="image-items"></div>
</div>

<div id="viewer-container">
    <div id="drop-zone"><div style="font-family: 'Cormorant Garamond', serif; font-size: 28px; color: var(--accent);">Open Your Vision</div></div>
</div>

<div id="hint" class="ui-element">タップしてUI表示切替</div>

<div id="ui-panel" class="ui-element">
    <div class="btn-group">
        <button id="upload-btn">Import</button>
        <button id="rotate-btn" class="active">Auto</button>
        <button id="gyro-btn">Gyro</button>
        <button id="shot-btn">Snapshot</button>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple style="display:none;">
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, sphere;
let lon = 0, lat = 0;
let isUserInteracting = false, autoRotate = true, useGyro = false;

// ジャイロ制御用のクォータニオン
const deviceQuaternion = new THREE.Quaternion();
const worldQuaternion = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)); // -90deg X-axis

init();
animate();

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1100);

    renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.NoToneMapping; 
    
    document.getElementById('viewer-container').appendChild(renderer.domElement);

    const geometry = new THREE.SphereGeometry(500, 60, 40);
    geometry.scale(-1, 1, 1);
    sphere = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ color: 0x000000 }));
    scene.add(sphere);

    setupInteractions();
    setupFeatures();
}

function setupInteractions() {
    const container = document.getElementById('viewer-container');
    let tapStartX, tapStartY, tapStartTime;

    container.addEventListener('pointerdown', (e) => {
        tapStartX = e.clientX; tapStartY = e.clientY;
        tapStartTime = Date.now();
        isUserInteracting = true;
        const sLon = lon, sLat = lat;
        const move = (ev) => {
            lon = (tapStartX - ev.clientX) * 0.15 + sLon;
            lat = (ev.clientY - tapStartY) * 0.15 + sLat;
        };
        const up = (ev) => {
            isUserInteracting = false;
            const dist = Math.hypot(ev.clientX - tapStartX, ev.clientY - tapStartY);
            if (dist < 5 && (Date.now() - tapStartTime) < 250) {
                document.body.classList.toggle('ui-hidden');
            }
            document.removeEventListener('pointermove', move);
            document.removeEventListener('pointerup', up);
        };
        document.addEventListener('pointermove', move);
        document.addEventListener('pointerup', up);
    });

    container.addEventListener('wheel', (e) => {
        camera.fov = Math.min(100, Math.max(20, camera.fov + e.deltaY * 0.05));
        camera.updateProjectionMatrix();
    });
}

function setupFeatures() {
    document.getElementById('upload-btn').onclick = (e) => { e.stopPropagation(); document.getElementById('file-input').click(); };
    document.getElementById('file-input').onchange = (e) => handleFiles(e.target.files);

    document.getElementById('rotate-btn').onclick = (e) => {
        e.stopPropagation(); autoRotate = !autoRotate;
        e.target.classList.toggle('active');
    };

    document.getElementById('shot-btn').onclick = (e) => {
        e.stopPropagation();
        const link = document.createElement('a');
        link.download = `masiro_${Date.now()}.png`;
        link.href = renderer.domElement.toDataURL('image/png');
        link.click();
    };

    document.getElementById('gyro-btn').onclick = (e) => {
        e.stopPropagation();
        if (!useGyro) requestGyroPermission(e.target);
        else { useGyro = false; e.target.classList.remove('active'); }
    };
}

async function requestGyroPermission(btn) {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        const response = await DeviceOrientationEvent.requestPermission();
        if (response === 'granted') {
            window.addEventListener('deviceorientation', onDeviceOrientation, true);
            useGyro = true; btn.classList.add('active');
        }
    } else {
        window.addEventListener('deviceorientation', onDeviceOrientation, true);
        useGyro = true; btn.classList.add('active');
    }
}

function onDeviceOrientation(e) {
    const alpha = e.alpha ? THREE.MathUtils.degToRad(e.alpha) : 0;
    const beta = e.beta ? THREE.MathUtils.degToRad(e.beta) : 0;
    const gamma = e.gamma ? THREE.MathUtils.degToRad(e.gamma) : 0;
    const orient = window.orientation ? THREE.MathUtils.degToRad(window.orientation) : 0;

    // クォータニオンを使用してデバイスの向きを計算
    const zee = new THREE.Vector3(0, 0, 1);
    const euler = new THREE.Euler(beta, alpha, -gamma, 'YXZ');
    deviceQuaternion.setFromEuler(euler);
    deviceQuaternion.multiply(new THREE.Quaternion().setFromAxisAngle(zee, -orient));
}

function handleFiles(files) {
    const listContainer = document.getElementById('image-items');
    document.getElementById('side-list').classList.add('active');
    Array.from(files).forEach((file, index) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const item = document.createElement('div');
            item.className = 'list-item';
            item.textContent = file.name;
            item.onclick = (ev) => { ev.stopPropagation(); loadToViewer(e.target.result, item); };
            listContainer.appendChild(item);
            if (index === 0 && document.querySelectorAll('.list-item').length === 1) loadToViewer(e.target.result, item);
        };
        reader.readAsDataURL(file);
    });
}

function loadToViewer(src, element) {
    new THREE.TextureLoader().load(src, (texture) => {
        texture.colorSpace = THREE.SRGBColorSpace;
        sphere.material.map = texture;
        sphere.material.color.set(0xffffff); 
        sphere.material.needsUpdate = true;
        document.getElementById('drop-zone').classList.add('hidden');
        document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
        if(element) element.classList.add('active');
    });
}

function animate() {
    requestAnimationFrame(animate);
    
    if (useGyro) {
        camera.quaternion.copy(worldQuaternion);
        camera.quaternion.multiply(deviceQuaternion);
    } else {
        if (autoRotate && !isUserInteracting) lon += 0.1;
        lat = Math.max(-85, Math.min(85, lat));
        const phi = THREE.MathUtils.degToRad(90 - lat);
        const theta = THREE.MathUtils.degToRad(lon);
        camera.lookAt(500 * Math.sin(phi) * Math.cos(theta), 500 * Math.cos(phi), 500 * Math.sin(phi) * Math.sin(theta));
    }
    
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
