<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>masiro | 360° Studio Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent: #c9a96e;
            --text: #ffffff;
            --panel-bg: rgba(15, 15, 15, 0.95); /* パネルを濃くして視認性アップ */
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        /* UI管理：初期状態は opacity 1 */
        .ui-element { transition: opacity 0.3s ease; opacity: 1; visibility: visible; z-index: 1000; }
        .ui-hidden .ui-element { opacity: 0; visibility: hidden; pointer-events: none; }

        header {
            position: absolute; top: 0; width: 100%; padding: 25px 30px;
            display: flex; justify-content: space-between; align-items: center; pointer-events: none;
        }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 26px; letter-spacing: 0.1em; pointer-events: auto; }
        .logo span { color: var(--accent); font-style: italic; margin-left: 4px; font-size: 20px; }

        #viewer-container { width: 100%; height: 100vh; cursor: grab; background: #000; }

        #side-list {
            position: absolute; left: 20px; top: 85px; width: 220px; max-height: 50vh;
            background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.15); 
            padding: 15px; border-radius: 8px; overflow-y: auto; display: none;
        }
        #side-list.active { display: block; }
        .list-item { font-size: 11px; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ccc; }
        .list-item:hover, .list-item.active { color: var(--accent); background: rgba(201, 169, 110, 0.1); }

        #ui-panel {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.2);
            padding: 15px 35px; border-radius: 60px; display: flex; align-items: center; gap: 20px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.8);
        }
        .btn-group { display: flex; gap: 15px; }
        button {
            background: transparent; border: none; color: var(--text); font-size: 11px; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; padding: 8px 5px;
        }
        button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        
        #drop-zone { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 2000; pointer-events: none; }
        #drop-zone.hidden { opacity: 0; visibility: hidden; }
        
        #hint { position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--accent); font-weight: 400; pointer-events: none; }
    </style>
</head>
<body>

<header class="ui-element">
    <div class="logo">masiro<span>360°</span></div>
</header>

<div id="side-list" class="ui-element">
    <div id="image-items"></div>
</div>

<div id="viewer-container">
    <div id="drop-zone"><div style="font-family: 'Cormorant Garamond', serif; font-size: 28px; color: var(--accent);">Open Your Vision</div></div>
</div>

<div id="hint" class="ui-element">背景をタップしてUIの表示切替</div>

<div id="ui-panel" class="ui-element">
    <div class="btn-group">
        <button id="upload-btn">Import</button>
        <button id="rotate-btn" class="active">Auto</button>
        <button id="gyro-btn">Gyro</button>
        <button id="shot-btn">Snapshot</button>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple style="display:none;">
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, sphere;
let lon = 0, lat = 0, phi = 0, theta = 0;
let isUserInteracting = false, autoRotate = true, useGyro = false;
let startLon = 0, startAlpha = null;

init();
animate();

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1100);

    renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.NoToneMapping; 
    
    document.getElementById('viewer-container').appendChild(renderer.domElement);

    const geometry = new THREE.SphereGeometry(500, 60, 40);
    geometry.scale(-1, 1, 1);
    const material = new THREE.MeshBasicMaterial({ color: 0x000000 });
    sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);

    setupInteractions();
    setupFeatures();
}

function setupInteractions() {
    const container = document.getElementById('viewer-container');
    let tapStartX, tapStartY, tapStartTime;

    container.addEventListener('pointerdown', (e) => {
        tapStartX = e.clientX;
        tapStartY = e.clientY;
        tapStartTime = Date.now();
        isUserInteracting = true;
        
        const sLon = lon, sLat = lat;
        const move = (ev) => {
            lon = (tapStartX - ev.clientX) * 0.15 + sLon;
            lat = (ev.clientY - tapStartY) * 0.15 + sLat;
        };
        const up = (ev) => {
            isUserInteracting = false;
            const dist = Math.hypot(ev.clientX - tapStartX, ev.clientY - tapStartY);
            const duration = Date.now() - tapStartTime;
            if (dist < 5 && duration < 250) {
                document.body.classList.toggle('ui-hidden');
            }
            document.removeEventListener('pointermove', move);
            document.removeEventListener('pointerup', up);
        };
        document.addEventListener('pointermove', move);
        document.addEventListener('pointerup', up);
    });

    container.addEventListener('wheel', (e) => {
        camera.fov = Math.min(95, Math.max(25, camera.fov + e.deltaY * 0.05));
        camera.updateProjectionMatrix();
    });
}

function setupFeatures() {
    document.getElementById('upload-btn').onclick = (e) => { e.stopPropagation(); document.getElementById('file-input').click(); };
    document.getElementById('file-input').onchange = (e) => handleFiles(e.target.files);

    document.getElementById('rotate-btn').onclick = (e) => {
        e.stopPropagation();
        autoRotate = !autoRotate;
        e.target.classList.toggle('active');
    };

    document.getElementById('shot-btn').onclick = (e) => {
        e.stopPropagation();
        const link = document.createElement('a');
        link.download = `masiro_shot_${Date.now()}.png`;
        link.href = renderer.domElement.toDataURL('image/png');
        link.click();
    };

    document.getElementById('gyro-btn').onclick = (e) => {
        e.stopPropagation();
        if (!useGyro) requestGyroPermission(e.target);
        else { useGyro = false; e.target.classList.remove('active'); startAlpha = null; }
    };
}

async function requestGyroPermission(btn) {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        const permission = await DeviceOrientationEvent.requestPermission();
        if (permission === 'granted') enableGyro(btn);
    } else { enableGyro(btn); }
}

function enableGyro(btn) {
    useGyro = true;
    btn.classList.add('active');
    window.addEventListener('deviceorientation', (e) => {
        if (!useGyro || isUserInteracting) return;
        // 初回のみ基準方位をリセット
        if (startAlpha === null) {
            startAlpha = e.alpha;
            startLon = lon;
        }
        // 角度を計算（デバイスを縦に持った状態を基準に補正）
        lon = (startAlpha - e.alpha) + startLon;
        lat = e.beta - 90;
    }, true);
}

function handleFiles(files) {
    const listContainer = document.getElementById('image-items');
    document.getElementById('side-list').classList.add('active');
    Array.from(files).forEach((file, index) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const item = document.createElement('div');
            item.className = 'list-item';
            item.textContent = file.name;
            item.onclick = (ev) => { ev.stopPropagation(); loadToViewer(e.target.result, item); };
            listContainer.appendChild(item);
            if (index === 0 && document.querySelectorAll('.list-item').length === 1) loadToViewer(e.target.result, item);
        };
        reader.readAsDataURL(file);
    });
}

function loadToViewer(src, element) {
    new THREE.TextureLoader().load(src, (texture) => {
        texture.colorSpace = THREE.SRGBColorSpace;
        sphere.material.map = texture;
        sphere.material.color.set(0xffffff); 
        sphere.material.needsUpdate = true;
        document.getElementById('drop-zone').classList.add('hidden');
        document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
        if(element) element.classList.add('active');
    });
}

function animate() {
    requestAnimationFrame(animate);
    if (autoRotate && !isUserInteracting && !useGyro) lon += 0.08;
    lat = Math.max(-85, Math.min(85, lat));
    phi = THREE.MathUtils.degToRad(90 - lat);
    theta = THREE.MathUtils.degToRad(lon);
    camera.lookAt(500 * Math.sin(phi) * Math.cos(theta), 500 * Math.cos(phi), 500 * Math.sin(phi) * Math.sin(theta));
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
