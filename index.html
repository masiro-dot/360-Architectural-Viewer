<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>masiro | High-Bright 360° Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --ui-bg: rgba(10, 10, 10, 0.9);
            --accent: #c9a96e;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-deep); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        header {
            position: absolute; top: 0; width: 100%; padding: 25px 40px;
            display: flex; align-items: baseline; gap: 15px; z-index: 100; pointer-events: none;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 100%);
        }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 26px; letter-spacing: 0.12em; color: var(--text); text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .logo span { color: var(--accent); }

        #viewer-container { width: 100%; height: 100vh; cursor: grab; }

        #ui-panel {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--ui-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); padding: 12px 30px;
            display: flex; align-items: center; gap: 25px; border-radius: 40px; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .file-info { font-size: 11px; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; font-weight: bold; }

        .btn-group { display: flex; gap: 15px; }
        button {
            background: transparent; border: none; color: var(--text); font-size: 11px;
            letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; padding: 5px 0; transition: 0.3s;
            border-bottom: 2px solid transparent;
        }
        button:hover { color: var(--accent); }
        button.active { border-bottom: 2px solid var(--accent); }

        #drop-zone {
            position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85); z-index: 50; transition: 0.8s ease-in-out;
        }
        #drop-zone.hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }
        .drop-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-style: italic; margin-bottom: 10px; color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="logo">masiro <span>360°</span></div>
</header>

<div id="viewer-container">
    <div id="drop-zone">
        <div class="drop-title">Seamless Vision</div>
        <p style="font-size: 12px; color: #888; letter-spacing: 0.2em;">DRAG & DROP PANORAMA</p>
    </div>
</div>

<div id="ui-panel">
    <div class="file-info" id="file-name">Ready for Gallery</div>
    <div class="btn-group">
        <button id="rotate-btn" class="active">Auto Rotation</button>
        <button id="upload-btn">Import File</button>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none;">
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, sphere;
let lon = 0, lat = 0, phi = 0, theta = 0;
let isUserInteracting = false;
let autoRotate = true;

init();
animate();

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1100);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    
    // 【最重要】明るさの設定を大幅に強化
    renderer.outputColorSpace = THREE.SRGBColorSpace; 
    renderer.toneMapping = THREE.LinearToneMapping; // パースの直感的な明るさを優先
    renderer.toneMappingExposure = 1.8; // 以前の1.2から1.8へ大幅アップ

    document.getElementById('viewer-container').appendChild(renderer.domElement);

    // 全体を照らす光を追加
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambientLight);

    const geometry = new THREE.SphereGeometry(500, 60, 40);
    geometry.scale(-1, 1, 1);
    
    // 初期状態の球体（テクスチャが来るまで真っ黒にしない）
    const material = new THREE.MeshBasicMaterial({ color: 0x333333 });
    sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);

    setupInteractions();
    setupFileUpload();
}

function setupInteractions() {
    const container = document.getElementById('viewer-container');
    container.addEventListener('pointerdown', (e) => {
        isUserInteracting = true;
        const startX = e.clientX;
        const startY = e.clientY;
        const startLon = lon;
        const startLat = lat;
        
        const onPointerMove = (ev) => {
            lon = (startX - ev.clientX) * 0.15 + startLon;
            lat = (ev.clientY - startY) * 0.15 + startLat;
        };
        const onPointerUp = () => {
            isUserInteracting = false;
            document.removeEventListener('pointermove', onPointerMove);
            document.removeEventListener('pointerup', onPointerUp);
        };
        document.addEventListener('pointermove', onPointerMove);
        document.addEventListener('pointerup', onPointerUp);
    });

    container.addEventListener('wheel', (e) => {
        camera.fov = Math.min(85, Math.max(20, camera.fov + e.deltaY * 0.05));
        camera.updateProjectionMatrix();
    });
}

function loadTexture(file) {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const loader = new THREE.TextureLoader();
        loader.load(e.target.result, (texture) => {
            // テクスチャの設定を高品質に
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;
            
            sphere.material.map = texture;
            sphere.material.needsUpdate = true;
            document.getElementById('drop-zone').classList.add('hidden');
            document.getElementById('file-name').textContent = file.name;
        });
    };
    reader.readAsDataURL(file);
}

function setupFileUpload() {
    const input = document.getElementById('file-input');
    const uploadBtn = document.getElementById('upload-btn');
    uploadBtn.onclick = () => input.click();
    input.onchange = (e) => loadTexture(e.target.files[0]);
    window.ondragover = (e) => e.preventDefault();
    window.ondrop = (e) => { e.preventDefault(); loadTexture(e.dataTransfer.files[0]); };
}

document.getElementById('rotate-btn').onclick = function() {
    autoRotate = !autoRotate;
    this.classList.toggle('active');
};

function animate() {
    requestAnimationFrame(animate);
    if (autoRotate && !isUserInteracting) lon += 0.08;
    lat = Math.max(-85, Math.min(85, lat));
    phi = THREE.MathUtils.degToRad(90 - lat);
    theta = THREE.MathUtils.degToRad(lon);
    camera.lookAt(500 * Math.sin(phi) * Math.cos(theta), 500 * Math.cos(phi), 500 * Math.sin(phi) * Math.sin(theta));
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
