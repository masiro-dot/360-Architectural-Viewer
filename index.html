<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>masiro | 360° Studio Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent: #c9a96e;
            --text: #ffffff;
            --panel-bg: rgba(0, 0, 0, 0.85);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        header {
            position: absolute; top: 0; width: 100%; padding: 20px 30px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100; pointer-events: none;
        }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 26px; letter-spacing: 0.1em; pointer-events: auto; }
        .logo span { color: var(--accent); font-style: italic; margin-left: 4px; font-size: 20px; }

        #viewer-container { width: 100%; height: 100vh; cursor: grab; }

        /* サイドバー */
        #side-list {
            position: absolute; left: 20px; top: 80px; width: 220px; max-height: 75vh;
            background: var(--panel-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 4px;
            overflow-y: auto; z-index: 100; transition: 0.3s;
        }
        .list-header { font-size: 9px; color: var(--accent); letter-spacing: 0.2em; margin-bottom: 12px; border-bottom: 1px solid rgba(201,169,110,0.3); padding-bottom: 5px; }
        .list-item {
            font-size: 11px; padding: 10px 5px; border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.6; transition: 0.2s;
        }
        .list-item:hover, .list-item.active { opacity: 1; color: var(--accent); background: rgba(255,255,255,0.03); }

        /* 操作パネル */
        #ui-panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); padding: 10px 30px;
            display: flex; align-items: center; gap: 25px; border-radius: 50px; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn-group { display: flex; gap: 20px; }
        button {
            background: transparent; border: none; color: var(--text); font-size: 11px;
            letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: 0.2s;
        }
        button:hover { color: var(--accent); }
        button.active { color: var(--accent); font-weight: bold; }
        #rec-btn.recording { color: #ff4444; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        #drop-zone {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85); z-index: 50; transition: 0.6s ease;
        }
        #drop-zone.hidden { opacity: 0; pointer-events: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">masiro<span>360°</span></div>
</header>

<div id="side-list" class="hidden">
    <div class="list-header">PROJECT GALLERY</div>
    <div id="image-items"></div>
</div>

<div id="viewer-container">
    <div id="drop-zone">
        <div style="font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--accent); font-style: italic;">Import Masterpieces</div>
    </div>
</div>

<div id="ui-panel">
    <div class="btn-group">
        <button id="upload-btn">Import</button>
        <button id="rotate-btn" class="active">Auto</button>
        <button id="shot-btn">Snapshot</button>
        <button id="rec-btn">Record</button>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple style="display:none;">
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, sphere;
let lon = 0, lat = 0, phi = 0, theta = 0;
let isUserInteracting = false, autoRotate = true;
let mediaRecorder, recordedChunks = [];

init();
animate();

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1100);

    renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.NoToneMapping;
    
    document.getElementById('viewer-container').appendChild(renderer.domElement);

    const geometry = new THREE.SphereGeometry(500, 60, 40);
    geometry.scale(-1, 1, 1);
    sphere = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ color: 0x000000 }));
    scene.add(sphere);

    setupInteractions();
    setupFeatures();
}

function setupInteractions() {
    const container = document.getElementById('viewer-container');
    container.addEventListener('pointerdown', (e) => {
        isUserInteracting = true;
        const startX = e.clientX, startY = e.clientY, startLon = lon, startLat = lat;
        const move = (ev) => {
            lon = (startX - ev.clientX) * 0.15 + startLon;
            lat = (ev.clientY - startY) * 0.15 + startLat;
        };
        const up = () => { isUserInteracting = false; document.removeEventListener('pointermove', move); };
        document.addEventListener('pointermove', move);
        document.addEventListener('pointerup', up);
    });

    container.addEventListener('wheel', (e) => {
        camera.fov = Math.min(90, Math.max(30, camera.fov + e.deltaY * 0.05));
        camera.updateProjectionMatrix();
    });
}

function setupFeatures() {
    const input = document.getElementById('file-input');
    const uploadBtn = document.getElementById('upload-btn');
    uploadBtn.onclick = () => input.click();
    
    input.addEventListener('change', (e) => {
        if (e.target.files.length > 0) handleFiles(e.target.files);
    });

    window.addEventListener('dragover', (e) => e.preventDefault());
    window.addEventListener('drop', (e) => {
        e.preventDefault();
        if (e.dataTransfer.files.length > 0) handleFiles(e.dataTransfer.files);
    });

    document.getElementById('shot-btn').onclick = () => {
        const link = document.createElement('a');
        link.download = `masiro_shot_${Date.now()}.png`;
        link.href = renderer.domElement.toDataURL('image/png');
        link.click();
    };

    document.getElementById('rec-btn').onclick = function() {
        if (!mediaRecorder || mediaRecorder.state === 'inactive') {
            startRecording(this);
        } else {
            mediaRecorder.stop();
            this.classList.remove('recording');
            this.innerText = 'Record';
        }
    };

    document.getElementById('rotate-btn').onclick = function() {
        autoRotate = !autoRotate;
        this.classList.toggle('active');
    };
}

function handleFiles(files) {
    const fileArray = Array.from(files);
    const listContainer = document.getElementById('image-items');
    document.getElementById('side-list').classList.remove('hidden');
    
    fileArray.forEach((file, index) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const item = document.createElement('div');
            item.className = 'list-item';
            item.textContent = file.name;
            item.onclick = () => loadToViewer(event.target.result, item);
            listContainer.appendChild(item);
            
            // 最初の画像、または追加した最初の画像を自動で表示
            if (index === 0) loadToViewer(event.target.result, item);
        };
        reader.readAsDataURL(file);
    });
}

function loadToViewer(src, element) {
    const loader = new THREE.TextureLoader();
    loader.load(src, (texture) => {
        texture.colorSpace = THREE.SRGBColorSpace;
        sphere.material.map = texture;
        sphere.material.color.set(0xffffff);
        sphere.material.needsUpdate = true;
        document.getElementById('drop-zone').classList.add('hidden');
        document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
    });
}

function startRecording(btn) {
    recordedChunks = [];
    const stream = renderer.domElement.captureStream(30);
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `masiro_video_${Date.now()}.webm`;
        a.click();
    };
    mediaRecorder.start();
    btn.classList.add('recording');
    btn.innerText = 'Stop';
}

function animate() {
    requestAnimationFrame(animate);
    if (autoRotate && !isUserInteracting) lon += 0.08;
    lat = Math.max(-85, Math.min(85, lat));
    phi = THREE.MathUtils.degToRad(90 - lat);
    theta = THREE.MathUtils.degToRad(lon);
    camera.lookAt(500 * Math.sin(phi) * Math.cos(theta), 500 * Math.cos(phi), 500 * Math.sin(phi) * Math.sin(theta));
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
